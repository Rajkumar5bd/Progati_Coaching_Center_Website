<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>যোগাযোগ - প্রগতি কোচিং সেন্টার (ফতুল্লা ক্যাম্পাস)</title>
    <style>
        /* প্রগতি লাক্সারি নিওন ডট গ্লো থিম সিএসএস */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        /* নিওন ডট গ্লো ব্যাকগ্রাউন্ড ইফেক্ট */
        body::before {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00ffcc;
            border-radius: 50%;
            top: 20%;
            left: 15%;
            box-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc;
            animation: blink 3s infinite alternate;
        }
        body::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff007f;
            border-radius: 50%;
            bottom: 30%;
            right: 15%;
            box-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
            animation: blink 4s infinite alternate;
        }
        @keyframes blink {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a0aec0;
        }
        label span {
            color: #ff007f;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        select option {
            background: #111625;
            color: #fff;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            color: #0b0f19;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        .submit-btn:hover {
            background: #00ccaa;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.7);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>প্রগতি পোর্টাল - যোগাযোগ করুন</h2>
    
    <!-- HTML ভ্যালিডেশন এবং সাবমিট অ্যাকশন শতভাগ নিশ্চিত করা হয়েছে -->
    <form id="progatiContactForm" onsubmit="return handleWhatsAppSubmit(event)">
        <div class="form-group">
            <label>আপনার সম্পূর্ণ নাম <span>*</span></label>
            <input type="text" id="fullName" class="form-control" required placeholder="যেমন: মোঃ জিহাদ">
        </div>

        <div class="form-group">
            <label>আপনার সচল মোবাইল নম্বর <span>*</span></label>
            <input type="tel" id="mobileNumber" class="form-control" required placeholder="যেমন: 01516514915">
        </div>

        <div class="form-group">
            <label>স্কুল বা কলেজের নাম (ঐচ্ছিক)</label>
            <input type="text" id="instituteName" class="form-control" placeholder="যেমন: ফতুল্লা পাইলট হাই স্কুল">
        </div>

        <div class="form-group">
            <label>আপনার শ্রেণী বা পরিচয় <span>*</span></label>
            <select id="userRole" class="form-control" required>
                <option value="" disabled selected>আপনার পরিচয় নির্বাচন করুন</option>
                <option value="শিক্ষার্থী">আমি একজন শিক্ষার্থী (Student)</option>
                <option value="অভিভাবক">আমি একজন অভিভাবক (Guardian)</option>
                <option value="শুভাকাঙ্ক্ষী">অন্যান্য / শুভাকাঙ্ক্ষী (Other)</option>
            </select>
        </div>

        <div class="form-group">
            <label>আপনার বিস্তারিত বার্তা বা জিজ্ঞাসা <span>*</span></label>
            <textarea id="userMessage" rows="4" class="form-control" required placeholder="আপনার প্রশ্ন বা মতামতটি এখানে বিস্তারিত লিখুন..."></textarea>
        </div>

        <button type="submit" class="submit-btn">হোয়াটসঅ্যাপে বার্তা পাঠান</button>
    </form>
</div>

<script>
    function handleWhatsAppSubmit(event) {
        // ১. ব্রাউজারের পেজ রিফ্রেশ হওয়া সবার আগে শক্তভাবে বন্ধ করা হলো
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }

        // ২. প্রতিটি ইনপুট আইডির মান সঠিকভাবে সংগ্রহ করা হচ্ছে
        var name = document.getElementById('fullName').value.trim();
        var mobile = document.getElementById('mobileNumber').value.trim();
        var institute = document.getElementById('instituteName').value.trim() || 'উল্লেখ নেই';
        var role = document.getElementById('userRole').value;
        var msg = document.getElementById('userMessage').value.trim();

        // ৩. ভ্যালিডেশন চেক
        if (!name || !mobile || !role || !msg) {
            alert('⚠️ দয়া করে সবকটি প্রয়োজনীয় (*) ফিল্ড সঠিকভাবে পূরণ করুন।');
            return false;
        }

        if (mobile.length < 10) {
            alert('⚠️ দয়া করে একটি সঠিক মোবাইল নম্বর প্রদান করুন।');
            return false;
        }

        // ৪. হোয়াটসঅ্যাপে পাঠানোর মেসেজ টেমপ্লেট
        var targetWhatsApp = "8801824868389";
        var textReport = "*নতুন যোগাযোগ বার্তা (Progati Portal)*\n" +
                           "━━━━━━━━━━━━━━━━━━━━\n" +
                           "👤 *নাম:* " + name + "\n" +
                           "📱 *মোবাইল:* " + mobile + "\n" +
                           "🏫 *প্রতিষ্ঠান:* " + institute + "\n" +
                           "🎖️ *পরিчয়:* " + role + "\n" +
                           "💬 *বার্তা:* " + msg + "\n" +
                           "━━━━━━━━━━━━━━━━━━━━\n" +
                           "⏳ _সময়: " + new Date().toLocaleString('bn-BD') + "_";

        // ৫. একদম নিরাপদ ইউআরএল ফরম্যাট তৈরি
        var finalURL = "https://wa.me" + targetWhatsApp + "?text=" + encodeURIComponent(textReport);
        
        // ৬. ব্রাউজারের সিকিউরিটি ব্লক এড়াতে এই ৩ লাইনের যেকোনো একটি অবশ্যই কাজ করবে
        // প্রথমে মেইন উইন্ডো রিডাইরেকশনের চেষ্টা করবে
        window.location.href = finalURL;
        
        // যদি সেটি কোনো কারণে আটকে যায়, ব্যাকআপ হিসেবে নতুন ট্যাবে ওপেন করবে
        setTimeout(function() {
            window.open(finalURL, '_blank');
        }, 100);

        return false;
    }
</script>

</body>
</html>
